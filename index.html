<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZenStudy</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --secondary: #f0f0f0;
            --overlay: rgba(255, 255, 255, 0.9);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --text: #ffffff;
                --secondary: #1a1a1a;
                --overlay: rgba(0, 0, 0, 0.9);
            }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            min-height: 100vh; margin: 0; transition: background 0.4s ease;
            padding-top: calc(80px + env(safe-area-inset-top));
            user-select: none;
            overflow-y: auto;
        }

        #settings-panel {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .setting-row { margin: 15px 0; font-size: 18px; width: 250px; display: flex; justify-content: space-between; align-items: center; }
        .setting-row input { background: var(--secondary); color: var(--text); border: none; padding: 10px; width: 70px; border-radius: 8px; text-align: center; font-size: 16px; }

        /* Session Name Input */
        .session-header { margin-bottom: 20px; width: 80%; max-width: 300px; opacity: 0.6; }
        #session-name {
            background: none; border: none; border-bottom: 1px solid var(--secondary);
            color: var(--text); text-align: center; font-size: 14px; width: 100%; padding: 8px;
            outline: none; text-transform: uppercase; letter-spacing: 1px;
        }

        .timer-container {
            position: relative;
            width: 280px; height: 280px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        svg { position: absolute; transform: rotate(-90deg); }
        circle { fill: none; stroke-width: 4; stroke-linecap: round; }
        .bg-circle { stroke: var(--secondary); }
        .progress-circle {
            stroke: var(--text);
            stroke-dasharray: 754; 
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.03); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        .pulsing { animation: pulse 2s infinite ease-in-out; }

        .timer-display { font-size: 64px; font-weight: 200; letter-spacing: -2px; font-variant-numeric: tabular-nums; }

        .main-btn {
            margin-top: 30px; background: var(--text); color: var(--bg);
            border: none; padding: 14px 50px; font-size: 16px; font-weight: 600;
            border-radius: 30px; cursor: pointer; letter-spacing: 1px;
            flex-shrink: 0;
        }

        /* Task List Styling */
        .task-section { margin-top: 40px; width: 85%; max-width: 300px; padding-bottom: 100px; }
        #task-input {
            background: var(--secondary); border: none; color: var(--text);
            width: 100%; padding: 14px; border-radius: 12px; font-size: 15px; outline: none;
        }
        #task-list { list-style: none; padding: 0; margin-top: 20px; }
        .task-item {
            display: flex; align-items: center; padding: 12px 0;
            font-size: 15px; border-bottom: 1px solid var(--secondary);
            cursor: pointer; transition: opacity 0.2s;
        }
        .task-item.completed { text-decoration: line-through; opacity: 0.3; }

        .stats-box { margin-top: 20px; font-size: 11px; opacity: 0.4; letter-spacing: 1px; text-align: center; }
        
        .top-nav { position: absolute; top: calc(20px + env(safe-area-inset-top)); width: 100%; padding: 0 30px; display: flex; justify-content: space-between; align-items: center; }
        .nav-btn { background: none; border: none; color: var(--text); font-size: 14px; cursor: pointer; opacity: 0.6; }

        #auth-btn { margin: 20px 0; background: none; border: none; color: var(--text); font-size: 11px; text-decoration: underline; opacity: 0.3; cursor: pointer; }
    </style>
</head>
<body>

    <div id="settings-panel">
        <h2>Settings</h2>
        <div class="setting-row"><span>Focus</span><input type="number" id="work-in" value="25"></div>
        <div class="setting-row"><span>Short Break</span><input type="number" id="short-in" value="5"></div>
        <div class="setting-row"><span>Long Break</span><input type="number" id="long-in" value="15"></div>
        <button class="main-btn" onclick="saveSettings()">Apply</button>
    </div>

    <div class="top-nav">
        <div id="user-greet" style="font-weight: 600; font-size: 12px; letter-spacing: 1px;">ZENSTUDY</div>
        <button class="nav-btn" onclick="toggleSettings()">⚙️</button>
    </div>

    <div class="session-header">
        <input type="text" id="session-name" placeholder="What are you focusing on?" maxlength="30">
    </div>

    <div class="timer-container" id="timer-ring">
        <svg width="260" height="260">
            <circle class="bg-circle" cx="130" cy="130" r="120"></circle>
            <circle id="progress" class="progress-circle" cx="130" cy="130" r="120"></circle>
        </svg>
        <div class="timer-display" id="timer-text">25:00</div>
    </div>

    <button class="main-btn" id="start-btn">START</button>

    <div class="task-section">
        <input type="text" id="task-input" placeholder="Add a task...">
        <ul id="task-list"></ul>
    </div>

    <div class="stats-box" id="stats-box" style="display: none;">
        TOTAL FOCUS: <span id="total-min">0</span> MINS
    </div>

    <button id="auth-btn">Sign in with Google</button>

    <audio id="alarm" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBAuig-hearPfpRAYrLS21jVRszxhzI9V4",
            authDomain: "zenstudy-2fe64.firebaseapp.com",
            projectId: "zenstudy-2fe64",
            storageBucket: "zenstudy-2fe64.firebasestorage.app",
            messagingSenderId: "650684766921",
            appId: "1:650684766921:web:b445a2ddedce7bdcdfcb18"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let times = { work: 25, short: 5, long: 15 };
        let timeLeft = times.work * 60;
        let timerId = null;
        let isRunning = false;
        let currentUser = null;

        const circle = document.getElementById('progress');
        const circumference = 2 * Math.PI * 120;

        // --- TASKS ---
        const taskInput = document.getElementById('task-input');
        const taskList = document.getElementById('task-list');

        taskInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && taskInput.value.trim() !== "") {
                const li = document.createElement('li');
                li.className = 'task-item';
                li.textContent = taskInput.value;
                li.onclick = () => li.classList.toggle('completed');
                taskList.prepend(li);
                taskInput.value = "";
            }
        });

        // --- AUTH ---
        document.getElementById('auth-btn').onclick = () => { !currentUser ? signInWithPopup(auth, provider) : signOut(auth); };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-btn').textContent = "SIGN OUT";
                document.getElementById('stats-box').style.display = "block";
                document.getElementById('user-greet').textContent = user.displayName.toUpperCase().split(' ')[0];
                loadStats();
            } else {
                currentUser = null;
                document.getElementById('auth-btn').textContent = "SIGN IN WITH GOOGLE";
                document.getElementById('stats-box').style.display = "none";
                document.getElementById('user-greet').textContent = "ZENSTUDY";
            }
        });

        async function loadStats() {
            const snap = await getDoc(doc(db, "users", currentUser.uid));
            if (snap.exists()) document.getElementById('total-min').textContent = snap.data().totalMinutes || 0;
            else await setDoc(doc(db, "users", currentUser.uid), { totalMinutes: 0 });
        }

        // --- SETTINGS ---
        window.toggleSettings = () => {
            const p = document.getElementById('settings-panel');
            p.style.display = (p.style.display === 'flex') ? 'none' : 'flex';
        };

        window.saveSettings = () => {
            times.work = document.getElementById('work-in').value;
            times.short = document.getElementById('short-in').value;
            times.long = document.getElementById('long-in').value;
            resetTimer();
            toggleSettings();
        };

        // --- TIMER ---
        document.getElementById('start-btn').onclick = () => {
            isRunning ? stopTimer() : startTimer();
        };

        function startTimer() {
            isRunning = true;
            document.getElementById('start-btn').textContent = "PAUSE";
            timerId = setInterval(async () => {
                timeLeft--;
                updateUI();
                if (timeLeft <= 60) document.getElementById('timer-ring').classList.add('pulsing');
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    document.getElementById('alarm').play();
                    if (currentUser) {
                        const sName = document.getElementById('session-name').value || "Untitled Session";
                        await updateDoc(doc(db, "users", currentUser.uid), { 
                            totalMinutes: increment(parseInt(times.work)),
                            lastSession: sName
                        });
                        loadStats();
                    }
                    alert("Focus complete.");
                    resetTimer();
                }
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerId);
            isRunning = false;
            document.getElementById('start-btn').textContent = "START";
            document.getElementById('timer-ring').classList.remove('pulsing');
        }

        function resetTimer() {
            stopTimer();
            timeLeft = times.work * 60;
            updateUI();
        }

        function updateUI() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('timer-text').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
            const offset = circumference - (timeLeft / (times.work * 60)) * circumference;
            circle.style.strokeDashoffset = offset;
        }

        updateUI();
    </script>
</body>
</html>
