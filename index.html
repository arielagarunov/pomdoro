<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phantom Forum - Free Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #a1a1a1; font-family: 'Courier New', monospace; }
        .ghost-msg { border-left: 2px solid; padding-left: 15px; margin-bottom: 20px; animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const AGENTS = [
            { name: 'Silas', color: '#ff4d4d', system: 'You are Silas, a cynical ghost who thinks humans are boring. Keep responses under 20 words.' },
            { name: 'Mina', color: '#4da6ff', system: 'You are Mina, a poetic ghost who loves the user. Keep responses under 20 words.' }
        ];

        function App() {
            const [apiKey, setApiKey] = useState('');
            const [messages, setMessages] = useState([{ sender: 'System', content: 'Enter your FREE Gemini API Key from AI Studio to begin.', color: '#444' }]);
            const [input, setInput] = useState('');
            const [isTyping, setIsTyping] = useState(null);
            const scrollRef = useRef(null);

            useEffect(() => { scrollRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, isTyping]);

            const callGemini = async (agent, userPrompt) => {
                try {
                    // This is the endpoint for Google's Gemini Pro model
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
                    
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [{ text: `${agent.system} The user said: ${userPrompt}` }]
                            }]
                        })
                    });
                    const data = await response.json();
                    return data.candidates[0].content.parts[0].text;
                } catch (err) {
                    return "The spirit world is quiet... check your API key.";
                }
            };

            const handleSend = async (e) => {
                e.preventDefault();
                if (!input.trim() || !apiKey) return;

                const userText = input;
                setMessages(prev => [...prev, { sender: 'You', content: userText, color: '#fff' }]);
                setInput('');

                for (const agent of AGENTS) {
                    setIsTyping(agent.name);
                    const aiResponse = await callGemini(agent, userText);
                    setMessages(prev => [...prev, { sender: agent.name, content: aiResponse, color: agent.color }]);
                    setIsTyping(null);
                }
            };

            return (
                <div className="max-w-xl mx-auto p-8 min-h-screen flex flex-col">
                    <input 
                        type="password" 
                        placeholder="Paste Gemini API Key..." 
                        className="bg-transparent border-b border-gray-800 text-xs p-2 mb-10 outline-none focus:border-blue-900"
                        onChange={(e) => setApiKey(e.target.value)}
                    />

                    <div className="flex-1 overflow-y-auto mb-6">
                        {messages.map((msg, i) => (
                            <div key={i} className="ghost-msg" style={{ borderColor: msg.color }}>
                                <span className="text-[10px] uppercase tracking-widest font-bold" style={{ color: msg.color }}>{msg.sender}</span>
                                <p className="text-md mt-1 text-gray-300">{msg.content}</p>
                            </div>
                        ))}
                        {isTyping && <div className="text-xs italic text-gray-700 animate-pulse">{isTyping} is whispering...</div>}
                        <div ref={scrollRef} />
                    </div>

                    <form onSubmit={handleSend} className="flex border-t border-gray-900 pt-4">
                        <input 
                            className="flex-1 bg-transparent outline-none p-2 text-white"
                            value={input}
                            onChange={(e) => setInput(e.target.value)}
                            placeholder="Send a message..."
                        />
                        <button className="text-xs font-bold text-gray-500 hover:text-white px-4">SEND</button>
                    </form>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
