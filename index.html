<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZenStudy</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">

    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --secondary: #f0f0f0;
            --overlay: rgba(255, 255, 255, 0.9);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --text: #ffffff;
                --secondary: #1a1a1a;
                --overlay: rgba(0, 0, 0, 0.9);
            }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            min-height: 100vh; margin: 0; transition: background 0.4s ease;
            padding-top: calc(60px + env(safe-area-inset-top));
            user-select: none;
            overflow-y: auto;
        }

        #settings-panel {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .setting-row { margin: 15px 0; font-size: 18px; width: 250px; display: flex; justify-content: space-between; align-items: center; }
        .setting-row input { background: var(--secondary); color: var(--text); border: none; padding: 10px; width: 70px; border-radius: 8px; text-align: center; font-size: 16px; }

        .session-header { margin-bottom: 10px; width: 80%; max-width: 300px; opacity: 0.6; }
        #session-name {
            background: none; border: none; border-bottom: 1px solid var(--secondary);
            color: var(--text); text-align: center; font-size: 14px; width: 100%; padding: 8px;
            outline: none; text-transform: uppercase; letter-spacing: 1px;
        }

        .timer-container {
            position: relative;
            width: 260px; height: 260px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        svg { position: absolute; transform: rotate(-90deg); }
        circle { fill: none; stroke-width: 4; stroke-linecap: round; }
        .bg-circle { stroke: var(--secondary); }
        .progress-circle {
            stroke: var(--text);
            stroke-dasharray: 754; 
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.03); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        .pulsing { animation: pulse 2s infinite ease-in-out; }

        .timer-display { font-size: 64px; font-weight: 200; letter-spacing: -2px; font-variant-numeric: tabular-nums; }

        .main-btn {
            margin-top: 20px; background: var(--text); color: var(--bg);
            border: none; padding: 14px 50px; font-size: 16px; font-weight: 600;
            border-radius: 30px; cursor: pointer; letter-spacing: 1px;
        }

        .habit-tracker { margin-top: 30px; width: 85%; max-width: 280px; text-align: center; }
        .streak-label { font-size: 10px; letter-spacing: 2px; opacity: 0.5; margin-bottom: 8px; }
        .heatmap { 
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; 
            padding: 8px; background: var(--secondary); border-radius: 8px; 
        }
        .heat-square { width: 100%; aspect-ratio: 1; background: var(--text); border-radius: 2px; opacity: 0.05; transition: opacity 0.3s; }
        .level-1 { opacity: 0.3; }
        .level-2 { opacity: 0.6; }
        .level-3 { opacity: 1; }

        .task-section { margin-top: 30px; width: 85%; max-width: 300px; padding-bottom: 100px; }
        #task-input {
            background: var(--secondary); border: none; color: var(--text);
            width: 100%; padding: 12px; border-radius: 10px; font-size: 14px; outline: none;
        }
        #task-list { list-style: none; padding: 0; margin-top: 15px; }
        .task-item {
            display: flex; align-items: center; padding: 10px 0;
            font-size: 14px; border-bottom: 1px solid var(--secondary);
            cursor: pointer;
        }
        .task-item.completed { text-decoration: line-through; opacity: 0.3; }

        .top-nav { position: absolute; top: calc(20px + env(safe-area-inset-top)); width: 100%; padding: 0 30px; display: flex; justify-content: space-between; align-items: center; }
        .nav-btn { background: none; border: none; color: var(--text); font-size: 14px; cursor: pointer; opacity: 0.6; }
        #auth-btn { margin: 20px 0; background: none; border: none; color: var(--text); font-size: 11px; text-decoration: underline; opacity: 0.3; cursor: pointer; }
    </style>
</head>
<body>

    <div id="settings-panel">
        <h2>Settings</h2>
        <div class="setting-row"><span>Focus</span><input type="number" id="work-in" value="25"></div>
        <div class="setting-row"><span>Short</span><input type="number" id="short-in" value="5"></div>
        <div class="setting-row"><span>Long</span><input type="number" id="long-in" value="15"></div>
        <button class="main-btn" onclick="saveSettings()">Apply</button>
    </div>

    <div class="top-nav">
        <div id="user-greet" style="font-weight: 600; font-size: 12px; letter-spacing: 1px;">ZENSTUDY</div>
        <button class="nav-btn" onclick="toggleSettings()">⚙️</button>
    </div>

    <div class="session-header">
        <input type="text" id="session-name" placeholder="FOCUS GOAL" maxlength="30">
    </div>

    <div class="timer-container" id="timer-ring">
        <svg width="240" height="240">
            <circle class="bg-circle" cx="120" cy="120" r="110"></circle>
            <circle id="progress" class="progress-circle" cx="120" cy="120" r="110"></circle>
        </svg>
        <div class="timer-display" id="timer-text">25:00</div>
    </div>

    <button class="main-btn" id="start-btn">START</button>

    <div class="habit-tracker" id="habit-tracker" style="display: none;">
        <div class="streak-label"><span id="streak-num">0</span> DAY STREAK</div>
        <div class="heatmap" id="heatmap"></div>
    </div>

    <div class="task-section">
        <input type="text" id="task-input" placeholder="Add a task...">
        <ul id="task-list"></ul>
    </div>

    <button id="auth-btn">Sign in with Google</button>
    <audio id="alarm" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBAuig-hearPfpRAYrLS21jVRszxhzI9V4",
            authDomain: "zenstudy-2fe64.firebaseapp.com",
            projectId: "zenstudy-2fe64",
            storageBucket: "zenstudy-2fe64.firebasestorage.app",
            messagingSenderId: "650684766921",
            appId: "1:650684766921:web:b445a2ddedce7bdcdfcb18"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let times = { work: 25, short: 5, long: 15 };
        let timeLeft = times.work * 60;
        let timerId = null;
        let isRunning = false;
        let currentUser = null;

        const circle = document.getElementById('progress');
        const circumference = 2 * Math.PI * 110;

        // Task Logic
        const taskInput = document.getElementById('task-input');
        const taskList = document.getElementById('task-list');
        taskInput.onkeypress = (e) => {
            if (e.key === 'Enter' && taskInput.value.trim() !== "") {
                const li = document.createElement('li');
                li.className = 'task-item';
                li.textContent = taskInput.value;
                li.onclick = () => li.classList.toggle('completed');
                taskList.prepend(li);
                taskInput.value = "";
            }
        };

        // Auth Logic
        document.getElementById('auth-btn').onclick = () => { !currentUser ? signInWithPopup(auth, provider) : signOut(auth); };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-btn').textContent = "LOGOUT";
                document.getElementById('habit-tracker').style.display = "block";
                document.getElementById('user-greet').textContent = user.displayName.split(' ')[0].toUpperCase();
                loadUserData();
            } else {
                currentUser = null;
                document.getElementById('auth-btn').textContent = "SIGN IN WITH GOOGLE";
                document.getElementById('habit-tracker').style.display = "none";
                document.getElementById('user-greet').textContent = "ZENSTUDY";
            }
        });

        async function loadUserData() {
            const snap = await getDoc(doc(db, "users", currentUser.uid));
            if (snap.exists()) {
                const data = snap.data();
                document.getElementById('streak-num').textContent = data.currentStreak || 0;
                renderHeatmap(data.history || {});
            }
        }

        function renderHeatmap(history) {
            const heatmap = document.getElementById('heatmap');
            heatmap.innerHTML = '';
            for (let i = 27; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                const dateStr = d.toISOString().split('T')[0];
                const mins = history[dateStr] || 0;
                const square = document.createElement('div');
                square.className = 'heat-square';
                if (mins > 0) square.classList.add('level-1');
                if (mins > 45) square.classList.add('level-2');
                if (mins > 90) square.classList.add('level-3');
                heatmap.appendChild(square);
            }
        }

        // Timer Logic
        document.getElementById('start-btn').onclick = () => { isRunning ? stopTimer() : startTimer(); };

        function startTimer() {
            isRunning = true;
            document.getElementById('start-btn').textContent = "PAUSE";
            timerId = setInterval(async () => {
                timeLeft--;
                updateUI();
                if (timeLeft <= 60) document.getElementById('timer-ring').classList.add('pulsing');
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    document.getElementById('alarm').play();
                    if (currentUser) await syncCompletion();
                    alert("Focus session complete.");
                    resetTimer();
                }
            }, 1000);
        }

        async function syncCompletion() {
            const userRef = doc(db, "users", currentUser.uid);
            const snap = await getDoc(userRef);
            const data = snap.data();
            const today = new Date().toISOString().split('T')[0];
            let newStreak = data.currentStreak || 0;

            if (data.lastActiveDate !== today) {
                const yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                newStreak = (data.lastActiveDate === yesterday.toISOString().split('T')[0]) ? newStreak + 1 : 1;
            }

            await updateDoc(userRef, {
                totalMinutes: increment(parseInt(times.work)),
                lastActiveDate: today,
                currentStreak: newStreak,
                [`history.${today}`]: increment(parseInt(times.work))
            });
            loadUserData();
        }

        function stopTimer() {
            clearInterval(timerId);
            isRunning = false;
            document.getElementById('start-btn').textContent = "START";
            document.getElementById('timer-ring').classList.remove('pulsing');
        }

        function resetTimer() {
            stopTimer();
            timeLeft = times.work * 60;
            updateUI();
        }

        function updateUI() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('timer-text').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
            circle.style.strokeDashoffset = circumference - (timeLeft / (times.work * 60)) * circumference;
        }

        window.toggleSettings = () => {
            const p = document.getElementById('settings-panel');
            p.style.display = (p.style.display === 'flex') ? 'none' : 'flex';
        };

        window.saveSettings = () => {
            times.work = document.getElementById('work-in').value;
            times.short = document.getElementById('short-in').value;
            times.long = document.getElementById('long-in').value;
            resetTimer();
            toggleSettings();
        };

        // Register PWA Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }

        updateUI();
    </script>
</body>
</html>
